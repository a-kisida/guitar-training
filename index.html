<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRETBOARD MASTER Pro</title>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --accent: #ffffff; --success: #00ff88; --text: #e0e0e0; --dim: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 600px; background: var(--card); padding: 20px; border: 1px solid var(--dim); text-align: center; }
        h1 { font-size: 12px; letter-spacing: 0.4em; color: var(--dim); margin-bottom: 20px; }
        
        /* 指板UI */
        .fretboard { display: flex; flex-direction: column; background: #1a1a1a; padding: 10px; border: 1px solid #444; margin: 20px 0; position: relative; }
        .string { display: flex; height: 35px; border-bottom: 1px solid #333; position: relative; }
        .string::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: #555; transform: translateY(-50%); z-index: 1; }
        .fret { flex: 1; display: flex; justify-content: center; align-items: center; border-right: 1px solid #444; position: relative; z-index: 2; cursor: pointer; font-size: 10px; }
        .fret:hover { background: rgba(255,255,255,0.05); }
        .note-dot { width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 12px; }
        .note-active { background: var(--accent); color: var(--bg); }
        .note-correct { background: var(--success); color: var(--bg); }
        .note-wrong { background: #ff3e3e; color: white; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: none; border: 1px solid #444; color: var(--text); padding: 12px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        button:hover { background: var(--accent); color: var(--bg); }
        .active-btn { background: var(--accent); color: var(--bg); }
        
        .quiz-target { font-size: 32px; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .fret-labels { display: flex; margin-left: 0; color: var(--dim); font-size: 10px; padding-bottom: 5px; }
        .fret-num { flex: 1; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>FRETBOARD MASTER PRO</h1>
    
    <div id="level-select">
        <h2>トレーニングレベルを選択</h2>
        <div class="btn-group">
            <button onclick="setLevel(1)">Lv.1: 6弦・5弦ルート音</button>
            <button onclick="setLevel(2)">Lv.2: ナチュラルノート(全弦)</button>
            <button onclick="setLevel(3)">Lv.3: 0-12フレット全音名</button>
        </div>
    </div>

    <div id="game-area" class="hidden">
        <div id="quiz-msg">音を探してください</div>
        <div class="quiz-target" id="target-note">?</div>
        
        <div class="fret-labels" id="fret-labels"></div>
        
        <div class="fretboard" id="fretboard">
            </div>

        <div id="feedback"></div>
        <div class="btn-group" style="margin-top:20px;">
            <button onclick="nextQuestion()">次の問題</button>
            <button onclick="location.reload()">レベル選択に戻る</button>
        </div>
    </div>
</div>

<script>
    const STRINGS = ["E", "B", "G", "D", "A", "E"]; 
    const NOTES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const ENHARMONICS = {"DB":"C#", "EB":"D#", "GB":"F#", "AB":"G#", "BB":"A#"};
    
    let currentLevel = 0;
    let targetNote = "";
    let maxFret = 12;

    function setLevel(lv) {
        currentLevel = lv;
        document.getElementById('level-select').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        initFretboard();
        nextQuestion();
    }

    function initFretboard() {
        const board = document.getElementById('fretboard');
        const labels = document.getElementById('fret-labels');
        board.innerHTML = "";
        labels.innerHTML = "";

        // フレット番号ラベル生成
        for(let f=0; f<=maxFret; f++) {
            labels.innerHTML += `<div class="fret-num">${f}</div>`;
        }

        // 弦とフレットの生成
        for (let s = 0; s < 6; s++) {
            const stringDiv = document.createElement('div');
            stringDiv.className = 'string';
            for (let f = 0; f <= maxFret; f++) {
                const fretDiv = document.createElement('div');
                fretDiv.className = 'fret';
                fretDiv.dataset.string = s;
                fretDiv.dataset.fret = f;
                fretDiv.onclick = () => checkFret(s, f, fretDiv);
                stringDiv.appendChild(fretDiv);
            }
            board.appendChild(stringDiv);
        }
    }

    function getNoteName(s, f) {
        let openIdx = NOTES.indexOf(STRINGS[s]);
        return NOTES[(openIdx + f) % 12];
    }

    function nextQuestion() {
        const notesPool = (currentLevel === 2) ? ["C","D","E","F","G","A","B"] : NOTES;
        targetNote = notesPool[Math.floor(Math.random() * notesPool.length)];
        document.getElementById('target-note').innerText = targetNote;
        document.getElementById('feedback').innerText = "";
        
        // 全ドットクリア
        document.querySelectorAll('.note-dot').forEach(d => d.remove());
    }

    function checkFret(s, f, el) {
        const note = getNoteName(s, f);
        
        // レベル1制限：6弦(5)と5弦(4)以外は無効
        if(currentLevel === 1 && s < 4) {
            document.getElementById('feedback').innerText = "Lv.1は6弦と5弦のみです";
            return;
        }

        const dot = document.createElement('div');
        dot.className = 'note-dot';
        dot.innerText = note;

        if (note === targetNote) {
            dot.classList.add('note-correct');
            document.getElementById('feedback').innerText = "正解！";
        } else {
            dot.classList.add('note-wrong');
            document.getElementById('feedback').innerText = `それは ${note} です`;
        }
        
        // 既存のドットがあれば消す
        if(el.firstChild) el.removeChild(el.firstChild);
        el.appendChild(dot);
    }
</script>
</body>
</html>
